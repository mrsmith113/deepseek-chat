<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private LLM Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100dvh; display: flex; flex-direction: column; }
  header { padding: 12px 20px; background: #1a1a2e; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 1rem; font-weight: 600; color: #7c9af5; }
  #status { font-size: 0.75rem; padding: 2px 8px; border-radius: 10px; background: #333; }
  #status.ok { background: #1a3a1a; color: #4caf50; }
  #status.err { background: #3a1a1a; color: #f44336; }
  #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .msg.user { background: #1e3a5f; align-self: flex-end; border-bottom-right-radius: 4px; }
  .msg.assistant { background: #1e1e2e; border: 1px solid #333; align-self: flex-start; border-bottom-left-radius: 4px; }
  .msg.assistant .meta { font-size: 0.7rem; color: #666; margin-top: 6px; }
  .msg.thinking { color: #666; font-style: italic; }
  footer { padding: 12px 20px; background: #1a1a2e; border-top: 1px solid #333; display: flex; gap: 8px; }
  textarea { flex: 1; background: #0f0f1a; color: #e0e0e0; border: 1px solid #333; border-radius: 8px; padding: 10px 14px; font-size: 0.95rem; resize: none; height: 50px; font-family: inherit; }
  textarea:focus { outline: none; border-color: #7c9af5; }
  button { background: #7c9af5; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; cursor: pointer; font-size: 0.95rem; font-weight: 600; }
  button:disabled { background: #333; color: #666; cursor: not-allowed; }
  #clear { background: transparent; border: 1px solid #333; color: #888; padding: 10px 14px; }
  #clear:hover { border-color: #666; color: #ccc; }
  .controls { display: flex; gap: 8px; align-items: center; margin-left: auto; }
  label { font-size: 0.8rem; color: #888; }
  select, input[type=range] { background: #0f0f1a; color: #e0e0e0; border: 1px solid #333; border-radius: 4px; padding: 2px 6px; }
</style>
</head>
<body>
<header>
  <h1>🤖 Private LLM — qwen3:14b</h1>
  <span id="status">проверка...</span>
  <div class="controls">
    <label>temp <input type="range" id="temp" min="0" max="1" step="0.1" value="0.7" style="width:80px"> <span id="tempVal">0.7</span></label>
    <label>stream <input type="checkbox" id="stream" checked></label>
  </div>
</header>
<div id="messages"></div>
<footer>
  <textarea id="input" placeholder="Введите сообщение... (Enter — отправить, Shift+Enter — перенос)" rows="1"></textarea>
  <button id="clear">✕</button>
  <button id="send">Отправить</button>
</footer>

<script>
const API = window.location.origin;
const messages = [];

async function checkHealth() {
  try {
    const r = await fetch(`${API}/health`);
    const d = await r.json();
    const s = document.getElementById('status');
    s.textContent = `✓ ${d.model} | ${d.rate_limit}`;
    s.className = 'ok';
  } catch {
    const s = document.getElementById('status');
    s.textContent = '✗ сервис недоступен';
    s.className = 'err';
  }
}

document.getElementById('temp').addEventListener('input', e => {
  document.getElementById('tempVal').textContent = e.target.value;
});

function addMsg(role, content, meta = '') {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = content;
  if (meta) {
    const m = document.createElement('div');
    m.className = 'meta';
    m.textContent = meta;
    div.appendChild(m);
  }
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
  return div;
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = '50px';
  messages.push({ role: 'user', content: text });
  addMsg('user', text);

  const btn = document.getElementById('send');
  btn.disabled = true;

  const useStream = document.getElementById('stream').checked;
  const temp = parseFloat(document.getElementById('temp').value);

  const thinking = addMsg('assistant', '...', '');
  thinking.classList.add('thinking');

  const t0 = Date.now();

  if (useStream) {
    // SSE streaming
    try {
      const resp = await fetch(`${API}/chat/stream`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, temperature: temp, max_tokens: 2048 }),
      });
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let answer = '';
      thinking.classList.remove('thinking');
      thinking.textContent = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const text = decoder.decode(value);
        for (const line of text.split('\n')) {
          if (line.startsWith('data: ')) {
            const data = JSON.parse(line.slice(6));
            if (data.token) {
              answer += data.token;
              thinking.textContent = answer;
              thinking.scrollIntoView({ behavior: 'smooth' });
            }
            if (data.done) {
              const elapsed = ((Date.now() - t0) / 1000).toFixed(1);
              const meta = thinking.querySelector('.meta') || document.createElement('div');
              meta.className = 'meta';
              meta.textContent = `${data.tokens} токенов | ${elapsed}с`;
              thinking.appendChild(meta);
            }
          }
        }
      }
      messages.push({ role: 'assistant', content: answer });
    } catch (e) {
      thinking.textContent = `❌ ${e.message}`;
      thinking.style.color = '#f44336';
    }
  } else {
    // Non-streaming
    try {
      const resp = await fetch(`${API}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, temperature: temp, max_tokens: 2048 }),
      });
      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.detail || resp.statusText);
      }
      const data = await resp.json();
      thinking.classList.remove('thinking');
      thinking.textContent = data.message.content;
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = `${data.tokens} токенов | ${data.elapsed}с`;
      thinking.appendChild(meta);
      messages.push({ role: 'assistant', content: data.message.content });
    } catch (e) {
      thinking.textContent = `❌ ${e.message}`;
      thinking.style.color = '#f44336';
    }
  }

  btn.disabled = false;
  input.focus();
}

document.getElementById('send').addEventListener('click', sendMessage);
document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  // auto-resize
  setTimeout(() => {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 150) + 'px';
  }, 0);
});
document.getElementById('clear').addEventListener('click', () => {
  messages.length = 0;
  document.getElementById('messages').innerHTML = '';
});

checkHealth();
setInterval(checkHealth, 30000);
</script>
</body>
</html>

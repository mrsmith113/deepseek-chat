name: AI Code Review

# Запускается на каждый pull request. Ассистент получает diff PR,
# прогоняет пайплайн task32 (эвристики + RAG + LLM) и постит ревью
# комментарием в PR.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write   # чтобы постить комментарий-ревью

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (полная история для diff BASE...HEAD)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build RAG index (документация + код)
        working-directory: "task32"
        run: python indexer.py

      - name: Generate AI review
        working-directory: "task32"
        env:
          # ключ опционален: без него ревью соберут эвристики + RAG
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          BASE="origin/${{ github.event.pull_request.base.ref }}"
          python review.py --base "$BASE" --head HEAD --out review.md
          echo "----- REVIEW -----"
          cat review.md

      - name: Post review as PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = "10-Активные-проекты/0. Обучение БЛМ/GIT/task32/review.md";
            const body = fs.readFileSync(path, 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.slice(0, 65000),
            });
